apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app
  namespace: omar

spec:
  replicas: 1

  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
     containers:
  - name: java-app
    image: omaryousry315/java:2
    ports:
      - containerPort: 8090
